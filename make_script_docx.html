<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Generating Script DOCX...</title>
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
</head>
<body style="background:#0f0f1a;color:#a78bfa;font-family:monospace;padding:40px;font-size:18px;">
<p id="status">⏳ Loading docx library...</p>
<script>
window.onload = async function() {
  const status = document.getElementById('status');
  try {
    status.textContent = '⚙️ Building document...';

    const {
      Document, Packer, Paragraph, TextRun, AlignmentType,
      HeadingLevel, BorderStyle, ShadingType, WidthType
    } = docx;

    const PURPLE   = "7C3AED";
    const LT_PURP  = "EDE9FE";
    const DARK     = "1F2937";
    const GREY     = "6B7280";

    function scene(text) {
      return new Paragraph({
        spacing: { before: 300, after: 100 },
        shading: { fill: LT_PURP, type: ShadingType.CLEAR },
        border: { left: { style: BorderStyle.SINGLE, size: 18, color: PURPLE, space: 4 } },
        indent: { left: 200 },
        children: [new TextRun({ text: `  ${text}`, bold: true, color: PURPLE, size: 22, font: "Arial" })]
      });
    }

    function line(speaker, dialog) {
      return new Paragraph({
        spacing: { before: 100, after: 100 },
        indent: { left: 400 },
        children: [
          new TextRun({ text: `${speaker}:  `, bold: true, color: DARK, size: 22, font: "Arial" }),
          new TextRun({ text: dialog, color: DARK, size: 22, font: "Arial" }),
        ]
      });
    }

    function dir(text) {
      return new Paragraph({
        spacing: { before: 60, after: 60 },
        indent: { left: 400 },
        children: [new TextRun({ text: `[ ${text} ]`, italics: true, color: GREY, size: 20, font: "Arial" })]
      });
    }

    function rule() {
      return new Paragraph({
        spacing: { before: 200, after: 200 },
        border: { bottom: { style: BorderStyle.SINGLE, size: 4, color: "D1D5DB" } },
        children: []
      });
    }

    function gap() {
      return new Paragraph({ spacing: { before: 100, after: 60 }, children: [] });
    }

    function note(text) {
      return new Paragraph({
        spacing: { before: 80, after: 80 },
        indent: { left: 400 },
        children: [new TextRun({ text: `⏱  ${text}`, italics: true, color: GREY, size: 20, font: "Arial" })]
      });
    }

    const doc = new Document({
      styles: {
        default: { document: { run: { font: "Arial", size: 22, color: DARK } } }
      },
      sections: [{
        properties: {
          page: {
            size: { width: 11906, height: 16838 },
            margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 }
          }
        },
        children: [

          // ── TITLE ──────────────────────────────────────────────────────
          new Paragraph({
            alignment: AlignmentType.CENTER,
            spacing: { before: 0, after: 80 },
            children: [new TextRun({ text: "AI FINDER", bold: true, size: 52, color: PURPLE, font: "Arial" })]
          }),
          new Paragraph({
            alignment: AlignmentType.CENTER,
            spacing: { before: 0, after: 80 },
            children: [new TextRun({ text: "Presentation Video Script", bold: true, size: 32, color: DARK, font: "Arial" })]
          }),
          new Paragraph({
            alignment: AlignmentType.CENTER,
            spacing: { before: 0, after: 60 },
            children: [new TextRun({ text: "2-Person  ·  Full English  ·  School Computer Lab with Big TV", size: 22, color: GREY, font: "Arial" })]
          }),
          new Paragraph({
            alignment: AlignmentType.CENTER,
            spacing: { before: 0, after: 360 },
            children: [new TextRun({ text: "Digital Fest 2026  ·  Social Media Impact (10 marks)", italics: true, size: 20, color: GREY, font: "Arial" })]
          }),

          rule(),

          // ── SCENE 1 ────────────────────────────────────────────────────
          scene("SCENE 1 — OPENING  [ Both on camera · TV shows AI Finder homepage ]"),
          gap(),
          line("Person A", "Hey everyone. We're here to show you something we built — and honestly, it's something the internet actually needs right now."),
          line("Person B", "It's called AI Finder. It detects whether an image was generated by AI — or taken by a real human."),

          rule(),

          // ── SCENE 2 ────────────────────────────────────────────────────
          scene("SCENE 2 — LIVE DEMO  [ Person B at keyboard · Person A explaining ]"),
          gap(),
          line("Person A", "So here's how it works. We go to our website — aifinder-phi.vercel.app — and we drop in any image."),
          dir("Person B types / pastes an image URL and clicks Analyze"),
          line("Person B", "Let's try this one. We hit Analyze..."),
          line("Person A", "And within seconds, the system scans it. It's looking at four things — artificial patterns, noise consistency, semantic coherence, and metadata anomalies."),
          dir("Result appears on the big TV — score shows 94% AI Generated"),
          line("Person B", "There it is. 94% AI Generated. The heatmap even shows you where in the image the AI signals are strongest."),

          rule(),

          // ── SCENE 3 ────────────────────────────────────────────────────
          scene("SCENE 3 — TECH EXPLANATION  [ Both standing near the TV ]"),
          gap(),
          line("Person A", "Under the hood, we're using a vision AI model to analyze the pixel-level structure of the image. Real photos have natural imperfections — grain, lighting inconsistencies. AI images don't."),
          line("Person B", "We built the backend as a serverless function on Vercel, and the frontend in React. The whole thing runs in the cloud — no installation needed."),

          rule(),

          // ── SCENE 4 ────────────────────────────────────────────────────
          scene("SCENE 4 — EXPLAIN PANEL  [ Person B clicks · Person A explains ]"),
          gap(),
          line("Person B", "And if you want to understand why it got that score — you click \"Get Detailed AI Analysis.\""),
          line("Person A", "It breaks down each signal. Like — Artificial Patterns scored high, meaning the textures are too smooth, too perfect. That's a classic AI tell."),

          rule(),

          // ── SCENE 5 ────────────────────────────────────────────────────
          scene("SCENE 5 — CLOSING  [ Both on camera · website URL on TV ]"),
          gap(),
          line("Person A", "In a world where deepfakes and AI art are everywhere, people need a fast, free way to verify what's real."),
          line("Person B", "That's what AI Finder does. Built by us, for everyone."),
          line("Person A", "Try it yourself — aifinder-phi.vercel.app"),
          line("Person B", "(smiles)  If it says 94%... it's not real."),
          dir("Both look at camera — end card with website URL displayed on TV behind them"),

          rule(),

          // ── PRODUCTION NOTES ───────────────────────────────────────────
          scene("PRODUCTION NOTES"),
          gap(),
          note("Estimated length: 1.5 – 2.5 minutes depending on demo speed"),
          note("Keep the demo slow and clear so the TV audience can follow along"),
          note("Person B should have the browser open and ready before recording starts"),
          note("Use an Unsplash image URL for the demo — Wikimedia URLs can block"),
          note("Stand slightly to the side near the TV so the result score is visible"),
          note("Video should be uploaded to social media for the Social Media Impact marks"),
        ]
      }]
    });

    status.textContent = '💾 Generating file...';
    const buffer = await Packer.toBlob(doc);
    const url = URL.createObjectURL(buffer);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'AI_Finder_Script.docx';
    document.body.appendChild(a);
    a.click();
    status.textContent = '✅ Done! AI_Finder_Script.docx has been downloaded.';
    status.style.color = '#34D399';
  } catch(e) {
    status.textContent = '❌ Error: ' + e.message;
    status.style.color = '#EF4444';
    console.error(e);
  }
};
</script>
</body>
</html>
