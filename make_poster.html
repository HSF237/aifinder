<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Generating poster...</title></head>
<body style="background:#111;color:#fff;font-family:monospace;padding:20px;">
<p id="status">Loading fonts...</p>
<canvas id="c" style="display:block;margin:20px auto;max-width:100%;border:1px solid #333;"></canvas>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const W = 2480, H = 3508;
const FONT_BASE = 'C:/Users/HI/AppData/Roaming/Claude/local-agent-mode-sessions/skills-plugin/5fbe131d-a1d4-4e91-97c0-26f06fa44286/5140ed67-f4e6-4d91-a36d-949f51358320/skills/canvas-design/canvas-fonts/';

const BG      = '#0A0A12';
const PURPLE  = '#7C3AED';
const VIOLET  = '#A855F7';
const CYAN    = '#22D3EE';
const MINT    = '#34D399';
const WARM    = '#F59E0B';
const PINK    = '#EC4899';
const DIM     = '#4B5563';
const LIGHT   = '#E5E7EB';
const WHITE   = '#FFFFFF';
const CARD_BG = '#111827';
const BORDER  = '#1F2937';

const tracks = [
  { num:'01', title:'Chill Abstract Intention', artist:'Filous / Abstract', vibe:'Opening credits · dreamy ambient',      source:'YouTube Audio Library', tag:'OPENER',          color:PURPLE },
  { num:'02', title:'Escape',                   artist:'Sappheiros',         vibe:'Deep-work focus · lo-fi electronic',   source:'YouTube Audio Library', tag:'ANALYSIS SCENE',   color:CYAN   },
  { num:'03', title:'Midnight City',            artist:'Tokyo Music Walker', vibe:'Slick tech feel · smooth synthwave',   source:'YouTube Audio Library', tag:'DEMO MOMENT',      color:VIOLET },
  { num:'04', title:'Running',                  artist:'DayFox',             vibe:'High energy · cinematic build-up',     source:'Pixabay · pixabay.com/music', tag:'RESULTS REVEAL', color:MINT   },
  { num:'05', title:'Sunrise',                  artist:'Liqwyd',             vibe:'Uplifting close · positive chillhop',  source:'YouTube Audio Library', tag:'OUTRO',            color:WARM   },
];

const tips = [
  ['Volume',  '15–20% during talking parts, 60–70% on B-roll footage'],
  ['Fade',    '0.5s fade-in / 1s fade-out on every audio cut'],
  ['Loop',    'All tracks loop cleanly — cut at the waveform downbeat'],
  ['License', 'Royalty-free for YouTube, school & festival projects'],
];

async function loadFonts() {
  const faces = [
    { family:'BigShoulders', src:'BigShoulders-Bold.ttf', weight:'bold' },
    { family:'Tektur',       src:'Tektur-Medium.ttf',     weight:'500'  },
    { family:'GeistMono',    src:'GeistMono-Regular.ttf', weight:'400'  },
    { family:'JetBrains',    src:'JetBrainsMono-Regular.ttf', weight:'400' },
    { family:'DMMono',       src:'DMMono-Regular.ttf',    weight:'400'  },
    { family:'Outfit',       src:'Outfit-Bold.ttf',       weight:'bold' },
    { family:'IBMPlexMono',  src:'IBMPlexMono-Bold.ttf',  weight:'bold' },
  ];
  for (const f of faces) {
    const ff = new FontFace(f.family, `url("${FONT_BASE}${f.src}")`, { weight: f.weight });
    try { await ff.load(); document.fonts.add(ff); } catch(e) { console.warn('font fail', f.family, e); }
  }
}

function hex2rgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function roundRect(ctx, x, y, w, h, r, fill, strokeColor, strokeW) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = strokeW || 2; ctx.stroke(); }
}

function centeredText(ctx, text, y, size, family, color, weight='normal') {
  ctx.font = `${weight} ${size}px "${family}"`;
  ctx.fillStyle = color;
  const m = ctx.measureText(text);
  ctx.fillText(text, (W - m.width) / 2, y);
}

async function draw() {
  document.getElementById('status').textContent = 'Drawing poster...';
  const canvas = document.getElementById('c');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ── Background ────────────────────────────────────────────────────────────
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#0F1322'; ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 120) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 120) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Top glow
  const grd = ctx.createRadialGradient(W/2, 0, 0, W/2, 0, 700);
  grd.addColorStop(0, '#2a0a5a'); grd.addColorStop(1, '#0A0A12');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, W, 600);

  // ── Header stripe ─────────────────────────────────────────────────────────
  roundRect(ctx, 140, 108, W-280, 12, 4, PURPLE);

  // ── Tag ───────────────────────────────────────────────────────────────────
  centeredText(ctx, 'FOR THE EDITOR', 220, 72, 'Tektur', VIOLET, '500');

  // ── Main title ────────────────────────────────────────────────────────────
  centeredText(ctx, 'SOUNDTRACK', 460, 210, 'BigShoulders', WHITE, 'bold');
  ctx.font = 'bold 210px "BigShoulders"';
  const tw = ctx.measureText('SOUNDTRACK').width;
  const tx = (W - tw) / 2;
  ctx.strokeStyle = PURPLE; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(tx, 480); ctx.lineTo(tx + tw, 480); ctx.stroke();

  centeredText(ctx, 'GUIDE', 680, 210, 'BigShoulders', VIOLET, 'bold');

  // ── Subtitle ──────────────────────────────────────────────────────────────
  centeredText(ctx, 'Background music picks for the AI Finder presentation video', 780, 48, 'DMMono', DIM);

  // ── Divider ───────────────────────────────────────────────────────────────
  ctx.strokeStyle = BORDER; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(140, 840); ctx.lineTo(W-140, 840); ctx.stroke();

  // ── Track cards ───────────────────────────────────────────────────────────
  const CARD_H = 370, GAP = 40, START_Y = 880;
  for (let i = 0; i < tracks.length; i++) {
    const t = tracks[i], cy = START_Y + i*(CARD_H+GAP);
    roundRect(ctx, 140, cy, W-280, CARD_H, 22, CARD_BG, t.color, 2);
    // accent bar
    roundRect(ctx, 140, cy, 12, CARD_H, 6, t.color);

    // Track number
    ctx.font = 'bold 150px "BigShoulders"';
    ctx.fillStyle = t.color; ctx.globalAlpha = 0.9;
    ctx.fillText(t.num, 210, cy + 30 + 130);
    ctx.globalAlpha = 1;

    // Title
    ctx.font = 'bold 64px "Outfit"'; ctx.fillStyle = WHITE;
    ctx.fillText(t.title, 420, cy + 80);

    // Artist
    ctx.font = '46px "DMMono"'; ctx.fillStyle = DIM;
    ctx.fillText(t.artist, 420, cy + 148);

    // Vibe
    ctx.font = '52px "JetBrains"'; ctx.fillStyle = LIGHT;
    ctx.fillText(t.vibe, 420, cy + 220);

    // Source
    ctx.font = '46px "DMMono"'; ctx.fillStyle = t.color;
    ctx.fillText('▸ ' + t.source, 420, cy + 295);

    // Tag pill
    const tagFont = '40px "DMMono"';
    ctx.font = tagFont;
    const tagW = ctx.measureText(t.tag).width + 48;
    const tagH = 56;
    const tx2 = W - 140 - 60 - tagW, ty2 = cy + 44;
    roundRect(ctx, tx2, ty2, tagW, tagH, 10, hex2rgba(t.color, 0.15), t.color, 2);
    ctx.fillStyle = t.color;
    ctx.fillText(t.tag, tx2 + 24, ty2 + 42);
  }

  // ── Tips ──────────────────────────────────────────────────────────────────
  let tipY = START_Y + tracks.length*(CARD_H+GAP) + 30;
  ctx.strokeStyle = BORDER; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(140, tipY); ctx.lineTo(W-140, tipY); ctx.stroke();
  tipY += 60;

  centeredText(ctx, 'MIXING TIPS', tipY + 56, 66, 'IBMPlexMono', '#374151', 'bold');
  tipY += 140;

  for (const [label, desc] of tips) {
    roundRect(ctx, 140, tipY, W-280, 100, 14, '#0D111C', BORDER, 1);
    ctx.font = '54px "Tektur"'; ctx.fillStyle = VIOLET;
    ctx.fillText(label, 200, tipY + 68);
    const lw = ctx.measureText(label).width;
    ctx.font = '46px "DMMono"'; ctx.fillStyle = LIGHT;
    ctx.fillText(desc, 200 + lw + 40, tipY + 68);
    tipY += 118;
  }

  // ── Footer ────────────────────────────────────────────────────────────────
  const footY = H - 220;
  ctx.strokeStyle = BORDER; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(140, footY); ctx.lineTo(W-140, footY); ctx.stroke();
  centeredText(ctx, 'AI FINDER  ·  Digital Fest 2026', footY + 70, 46, 'DMMono', DIM);
  centeredText(ctx, 'aifinder-phi.vercel.app', footY + 130, 46, 'DMMono', PURPLE);

  // ── Bottom colour bar ─────────────────────────────────────────────────────
  const barColors = [PURPLE, VIOLET, CYAN, MINT, WARM, PINK];
  const bw = (W-280)/6;
  for (let i = 0; i < barColors.length; i++) {
    roundRect(ctx, 140 + i*bw, H-56, bw-6, 40, 6, barColors[i]);
  }

  // ── Download ──────────────────────────────────────────────────────────────
  document.getElementById('status').textContent = 'Saving PNG...';
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'music_guide.png';
    a.click();
    document.getElementById('status').textContent = '✅ Done! Check your Downloads folder.';
  }, 'image/png');
}

loadFonts().then(draw);
</script>
</body>
</html>
