<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200;12..96,400;12..96,700;12..96,800&family=JetBrains+Mono:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    background: #04040a;
  }

  .canvas {
    width: 1200px;
    height: 628px;
    position: relative;
    background: #04040a;
    overflow: hidden;
  }

  svg.bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .content {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
  }

  .left-panel {
    flex: 0 0 540px;
    padding: 60px 56px 60px 70px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
  }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    font-weight: 400;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: #7c3aed;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge::before {
    content: '';
    display: inline-block;
    width: 18px;
    height: 1px;
    background: #7c3aed;
  }

  .brand {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 88px;
    font-weight: 800;
    line-height: 0.9;
    color: #f0eeff;
    letter-spacing: -3px;
    margin-bottom: 6px;
  }

  .brand span {
    color: #7c3aed;
  }

  .tagline {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: rgba(167, 139, 250, 0.65);
    letter-spacing: 0.5px;
    margin-top: 14px;
    margin-bottom: 36px;
    line-height: 1.5;
  }

  .stats-row {
    display: flex;
    gap: 28px;
    margin-bottom: 40px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .stat-value {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #a78bfa;
    line-height: 1;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(167, 139, 250, 0.4);
  }

  .divider {
    width: 1px;
    height: 36px;
    background: rgba(124, 58, 237, 0.2);
    align-self: center;
  }

  .features {
    display: flex;
    flex-direction: column;
    gap: 9px;
    margin-bottom: 44px;
  }

  .feature-item {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    font-weight: 400;
    letter-spacing: 1px;
    color: rgba(240, 238, 255, 0.5);
  }

  .feature-item::before {
    content: '▸';
    color: #7c3aed;
    font-size: 9px;
  }

  .url-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 1.5px;
    color: rgba(124, 58, 237, 0.6);
    border-top: 1px solid rgba(124, 58, 237, 0.12);
    padding-top: 20px;
  }

  .right-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    height: 100%;
  }
</style>
</head>
<body>
<div class="canvas">

  <!-- Background SVG -->
  <svg class="bg" viewBox="0 0 1200 628" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Radial gradient — right-side glow -->
      <radialGradient id="coreGlow" cx="72%" cy="50%" r="38%">
        <stop offset="0%" stop-color="#3b1880" stop-opacity="0.55"/>
        <stop offset="55%" stop-color="#1a0a40" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="#04040a" stop-opacity="0"/>
      </radialGradient>
      <!-- Left panel fade -->
      <radialGradient id="leftGlow" cx="20%" cy="50%" r="40%">
        <stop offset="0%" stop-color="#100830" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#04040a" stop-opacity="0"/>
      </radialGradient>
      <!-- Center circle pulse -->
      <radialGradient id="pulseGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
        <stop offset="60%" stop-color="#4c1d95" stop-opacity="0.05"/>
        <stop offset="100%" stop-color="#04040a" stop-opacity="0"/>
      </radialGradient>
      <!-- Hex pattern fill -->
      <pattern id="hexGrid" x="0" y="0" width="40" height="46.2" patternUnits="userSpaceOnUse">
        <polygon points="20,2 38,12 38,34 20,44 2,34 2,12"
                 fill="none" stroke="#7c3aed" stroke-width="0.3" stroke-opacity="0.18"/>
      </pattern>
      <!-- Inner glow filter for core ring -->
      <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="8" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
      <!-- Soft glow for rings -->
      <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
      <!-- Scan line gradient -->
      <linearGradient id="scanLine" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
        <stop offset="30%" stop-color="#7c3aed" stop-opacity="0.7"/>
        <stop offset="70%" stop-color="#a78bfa" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
      </linearGradient>
      <!-- Dot glow -->
      <filter id="dotGlow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="softGlow">
        <feGaussianBlur stdDeviation="12" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <clipPath id="canvasClip">
        <rect width="1200" height="628"/>
      </clipPath>
    </defs>

    <g clip-path="url(#canvasClip)">
      <!-- Base background -->
      <rect width="1200" height="628" fill="#04040a"/>

      <!-- Ambient glows -->
      <rect width="1200" height="628" fill="url(#coreGlow)"/>
      <rect width="1200" height="628" fill="url(#leftGlow)"/>

      <!-- Full-canvas hex grid at very low opacity -->
      <rect width="1200" height="628" fill="url(#hexGrid)" opacity="0.6"/>

      <!-- Subtle vertical panel separator -->
      <line x1="540" y1="0" x2="540" y2="628" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.08"/>

      <!-- === RIGHT SIDE: DETECTION VISUALIZATION === -->
      <!-- Center point of the reticle -->
      <!-- Large ambient pulse -->
      <circle cx="856" cy="314" r="230" fill="url(#pulseGrad)"/>

      <!-- Outer concentric rings -->
      <circle cx="856" cy="314" r="220" fill="none" stroke="#7c3aed" stroke-width="0.4" stroke-opacity="0.12"/>
      <circle cx="856" cy="314" r="196" fill="none" stroke="#7c3aed" stroke-width="0.4" stroke-opacity="0.18"/>
      <circle cx="856" cy="314" r="168" fill="none" stroke="#a78bfa" stroke-width="0.6" stroke-opacity="0.22"/>
      <circle cx="856" cy="314" r="140" fill="none" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.28"/>
      <circle cx="856" cy="314" r="110" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.35" filter="url(#ringGlow)"/>
      <circle cx="856" cy="314" r="82"  fill="none" stroke="#a78bfa" stroke-width="1.2" stroke-opacity="0.5" filter="url(#ringGlow)"/>
      <circle cx="856" cy="314" r="54"  fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.65" filter="url(#ringGlow)"/>

      <!-- Bright inner core ring -->
      <circle cx="856" cy="314" r="30"  fill="none" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.9" filter="url(#glowFilter)"/>
      <circle cx="856" cy="314" r="8"   fill="#7c3aed" fill-opacity="0.9" filter="url(#dotGlow)"/>
      <circle cx="856" cy="314" r="3"   fill="#c4b5fd" fill-opacity="1"/>

      <!-- Radial tick marks on rings -->
      <!-- Ring at r=110: 12 ticks -->
      <g stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.5">
        <line x1="856" y1="204" x2="856" y2="192"/>
        <line x1="856" y1="424" x2="856" y2="436"/>
        <line x1="746" y1="314" x2="734" y2="314"/>
        <line x1="966" y1="314" x2="978" y2="314"/>
        <line x1="933.8" y1="236.2" x2="942.1" y2="227.9"/>
        <line x1="778.2" y1="236.2" x2="769.9" y2="227.9"/>
        <line x1="933.8" y1="391.8" x2="942.1" y2="400.1"/>
        <line x1="778.2" y1="391.8" x2="769.9" y2="400.1"/>
      </g>

      <!-- Crosshairs -->
      <line x1="856" y1="80" x2="856" y2="256" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.3"/>
      <line x1="856" y1="372" x2="856" y2="548" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.3"/>
      <line x1="600" y1="314" x2="780" y2="314" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.3"/>
      <line x1="932" y1="314" x2="1140" y2="314" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.3"/>

      <!-- Scan sweep arc (glowing partial arc suggesting movement) -->
      <path d="M 856 314 L 856 204 A 110 110 0 0 1 966 314 Z"
            fill="#7c3aed" fill-opacity="0.04"/>
      <path d="M 856 204 A 110 110 0 0 1 966 314"
            fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6"
            filter="url(#ringGlow)"/>

      <!-- Hexagonal sensor grid overlay (at detection zone) -->
      <!-- Small hex cells around core -->
      <g fill="none" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.35">
        <polygon points="856,261 876,272 876,294 856,305 836,294 836,272"/>
        <polygon points="856,305 876,316 876,338 856,349 836,338 836,316"/>
        <polygon points="856,217 876,228 876,250 856,261 836,250 836,228"/>
        <polygon points="892,283 912,294 912,316 892,327 872,316 872,294"/>
        <polygon points="820,283 840,294 840,316 820,327 800,316 800,294"/>
        <polygon points="892,239 912,250 912,272 892,283 872,272 872,250"/>
        <polygon points="820,239 840,250 840,272 820,283 800,272 800,250"/>
        <polygon points="928,261 948,272 948,294 928,305 908,294 908,272"/>
        <polygon points="784,261 804,272 804,294 784,305 764,294 764,272"/>
        <polygon points="928,305 948,316 948,338 928,349 908,338 908,316"/>
        <polygon points="784,305 804,316 804,338 784,349 764,338 764,316"/>
      </g>

      <!-- Detection signal dots on hex vertices -->
      <g filter="url(#dotGlow)">
        <circle cx="856" cy="261" r="2" fill="#a78bfa" fill-opacity="0.9"/>
        <circle cx="876" cy="272" r="1.5" fill="#7c3aed" fill-opacity="0.8"/>
        <circle cx="836" cy="294" r="2" fill="#a78bfa" fill-opacity="0.7"/>
        <circle cx="912" cy="294" r="1.5" fill="#c4b5fd" fill-opacity="0.6"/>
        <circle cx="800" cy="316" r="2" fill="#7c3aed" fill-opacity="0.8"/>
        <circle cx="948" cy="272" r="1.5" fill="#a78bfa" fill-opacity="0.5"/>
        <circle cx="764" cy="283" r="1.5" fill="#a78bfa" fill-opacity="0.6"/>
        <!-- Red anomaly signal -->
        <circle cx="912" cy="250" r="3" fill="#ef4444" fill-opacity="0.85"/>
        <circle cx="876" cy="338" r="2" fill="#ef4444" fill-opacity="0.6"/>
        <!-- Green auth signal -->
        <circle cx="820" cy="261" r="2" fill="#22c55e" fill-opacity="0.75"/>
      </g>

      <!-- Coordinate labels -->
      <text x="978" y="318" font-family="'JetBrains Mono', monospace" font-size="7"
            fill="#7c3aed" fill-opacity="0.5" letter-spacing="1">X:856 Y:314</text>
      <text x="856" y="90" font-family="'JetBrains Mono', monospace" font-size="7"
            fill="#7c3aed" fill-opacity="0.5" letter-spacing="1" text-anchor="middle">N_AXIS</text>
      <text x="612" y="318" font-family="'JetBrains Mono', monospace" font-size="7"
            fill="#7c3aed" fill-opacity="0.5" letter-spacing="1">SCAN:ACTIVE</text>
      <text x="856" y="543" font-family="'JetBrains Mono', monospace" font-size="7"
            fill="#7c3aed" fill-opacity="0.4" letter-spacing="1" text-anchor="middle">S_AXIS</text>

      <!-- Classification readout box — top right of reticle -->
      <rect x="954" y="148" width="140" height="56" rx="2"
            fill="#04040a" fill-opacity="0.9"
            stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.4"/>
      <text x="964" y="163" font-family="'JetBrains Mono', monospace" font-size="7"
            fill="#7c3aed" fill-opacity="0.6" letter-spacing="1.5">CLASSIFICATION</text>
      <text x="964" y="180" font-family="'JetBrains Mono', monospace" font-size="10"
            fill="#a78bfa" fill-opacity="0.9" font-weight="600" letter-spacing="0.5">AI_GENERATED</text>
      <line x1="964" y1="184" x2="1082" y2="184" stroke="#7c3aed" stroke-width="0.3" stroke-opacity="0.3"/>
      <text x="964" y="196" font-family="'JetBrains Mono', monospace" font-size="7"
            fill="#ef4444" fill-opacity="0.7" letter-spacing="1">CONFIDENCE: 94%</text>

      <!-- Signal readout bottom -->
      <rect x="630" y="454" width="150" height="48" rx="2"
            fill="#04040a" fill-opacity="0.85"
            stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.35"/>
      <text x="640" y="468" font-family="'JetBrains Mono', monospace" font-size="7"
            fill="#7c3aed" fill-opacity="0.5" letter-spacing="1.5">NEURAL_MAP</text>
      <text x="640" y="482" font-family="'JetBrains Mono', monospace" font-size="9"
            fill="#a78bfa" fill-opacity="0.8" letter-spacing="0.5">HEATMAP ACTIVE</text>
      <text x="640" y="495" font-family="'JetBrains Mono', monospace" font-size="7"
            fill="#22c55e" fill-opacity="0.7" letter-spacing="1">22 SIGNATURES LOADED</text>

      <!-- Bottom right: model tag -->
      <text x="1100" y="580" font-family="'JetBrains Mono', monospace" font-size="7"
            fill="#7c3aed" fill-opacity="0.3" letter-spacing="1" text-anchor="end">REV_3.0 · SIGNAL_VOID</text>

      <!-- Decorative corner markers -->
      <g stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.25" fill="none">
        <!-- TL -->
        <line x1="32" y1="32" x2="64" y2="32"/>
        <line x1="32" y1="32" x2="32" y2="64"/>
        <!-- TR -->
        <line x1="1168" y1="32" x2="1136" y2="32"/>
        <line x1="1168" y1="32" x2="1168" y2="64"/>
        <!-- BL -->
        <line x1="32" y1="596" x2="64" y2="596"/>
        <line x1="32" y1="596" x2="32" y2="564"/>
        <!-- BR -->
        <line x1="1168" y1="596" x2="1136" y2="596"/>
        <line x1="1168" y1="596" x2="1168" y2="564"/>
      </g>

      <!-- Top-left classification marker -->
      <text x="48" y="46" font-family="'JetBrains Mono', monospace" font-size="7"
            fill="#7c3aed" fill-opacity="0.35" letter-spacing="2">AIFINDER SYSTEMS · v3.0</text>

    </g>
  </svg>

  <!-- Text content layer -->
  <div class="content">
    <div class="left-panel">
      <div class="badge">AI Detection Engine</div>

      <div class="brand">AI<span>Finder</span></div>

      <div class="tagline">
        See through the illusion.<br>
        Detect AI-generated images &amp; text in seconds.
      </div>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-value">22+</span>
          <span class="stat-label">AI Signatures</span>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <span class="stat-value">&lt;3s</span>
          <span class="stat-label">Detection Time</span>
        </div>
        <div class="divider"></div>
        <div class="stat">
          <span class="stat-value">2-in-1</span>
          <span class="stat-label">Image + Text</span>
        </div>
      </div>

      <div class="features">
        <div class="feature-item">Neural vision heatmap visualization</div>
        <div class="feature-item">Text pattern &amp; vocabulary analysis</div>
        <div class="feature-item">Identifies ChatGPT, Claude, Gemini &amp; more</div>
      </div>

      <div class="url-line">aifinder-phi.vercel.app</div>
    </div>

    <!-- right panel is rendered in SVG -->
    <div class="right-panel"></div>
  </div>

</div>
</body>
</html>
